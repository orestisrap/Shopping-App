<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Shopping Filter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; max-width: 480px; margin: 0 auto; }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 5px; }
        .sub { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid #334155; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #cbd5e1; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; font-size: 16px; background-color: #0f172a; color: white; box-sizing: border-box; }
        input[type="file"] { margin-top: 5px; color: #94a3b8; }
        .checkbox-container { margin-top: 15px; display: flex; align-items: center; background: #1e3a8a; padding: 12px; border-radius: 8px; border: 1px solid #1d4ed8; }
        .checkbox-container input { margin-right: 10px; transform: scale(1.3); }
        button { width: 100%; background-color: #38bdf8; color: #0f172a; border: none; padding: 14px; font-size: 18px; font-weight: bold; border-radius: 8px; margin-top: 25px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #0ea5e9; }
        #resultBox { display: none; text-align: center; margin-top: 20px; padding: 20px; border-radius: 12px; font-size: 22px; font-weight: bold; }
        .green { background-color: #10b981; color: white; }
        .yellow { background-color: #f59e0b; color: #0f172a; }
        .red { background-color: #ef4444; color: white; }
        .loading { text-align: center; color: #94a3b8; font-style: italic; display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <h2>🤖 AI Shopping Filter</h2>
    <div class="sub">Έκδοση Online με Αυτόματη Ανάλυση</div>
    
    <div class="card">
        <!-- Εισαγωγή Προϊόντος / Φωτογραφίας -->
        <label for="productName">🛒 Όνομα Προϊόντος ή Σκανάρισμα:</label>
        <input type="text" id="productName" placeholder="π.χ. Μπάρα πρωτεΐνης γεύση σοκολάτα">
        <input type="file" id="productImage" accept="image/*">

        <!-- Φίλτρο Κόστους με τιμή -->
        <label for="price">💰 Τιμή Προϊόντος (€):</label>
        <input type="number" id="price" step="0.01" placeholder="π.χ. 2.50">

        <!-- Φίλτρο Επιθυμίας -->
        <label for="desire">❤️ Πόσο το θέλεις τώρα; (1-10):</label>
        <select id="desire">
            <option value="10">10 - Απόλυτη Επιβίωση (Νερό, φάρμακα)</option>
            <option value="9">9 - Κρίσιμη Ανάγκη (Εργαλείο δουλειάς)</option>
            <option value="8">8 - Βασική Ανάγκη (Ρούχα, απαραίτητα)</option>
            <option value="7">7 - Αναβάθμιση Ζωής (Πιο γρήγορο κινητό)</option>
            <option value="6">6 - Σταθερή Επιθυμία (Το θες μήνες, χόμπι)</option>
            <option value="5">5 - Μέτρια Επιθυμία (Σου αρέσει απλά)</option>
            <option value="4">4 - Παρορμητική τάση (Το είδες τώρα)</option>
            <option value="3">3 - Περαστικό καπρίτσιο (Shopping therapy)</option>
            <option value="2">2 - Κοινωνική πίεση (Trends)</option>
            <option value="1">1 - Άνετα ζεις χωρίς αυτό (Περιττό)</option>
        </select>

        <!-- Social Bonus -->
        <div class="checkbox-container">
            <input type="checkbox" id="socialBonus">
            <label for="socialBonus" style="margin: 0; font-weight: normal; font-size: 15px; color: #bfdbfe;">👥 Είμαι με παρέα / φίλους (+1 Bonus)</label>
        </div>

        <button onclick="runAIAnalysis()">ΑΝΑΛΥΣΗ & ΥΠΟΛΟΓΙΣΜΟΣ</button>
    </div>

    <div id="loadingText" class="loading">🔄 Το AI αναλύει τα συστατικά και την τιμή...</div>
    <div id="resultBox"></div>

    <script>
        function calculateCostScore(price) {
            if (price <= 2) return 10;
            if (price <= 5) return 9;
            if (price <= 15) return 8;
            if (price <= 50) return 7;
            if (price <= 100) return 6;
            if (price <= 300) return 5;
            if (price <= 800) return 4;
            if (price <= 2000) return 3;
            if (price <= 10000) return 2;
            return 1;
        }

        async function runAIAnalysis() {
            const product = document.getElementById('productName').value;
            const price = parseFloat(document.getElementById('price').value);
            const desire = parseFloat(document.getElementById('desire').value);
            const isSocial = document.getElementById('socialBonus').checked;
            
            if (!product || isNaN(price)) {
                alert("Παρακαλώ συμπλήρωσε όνομα προϊόντος και τιμή!");
                return;
            }

            document.getElementById('loadingText').style.display = "block";
            document.getElementById('resultBox').style.display = "none";

            // ΠΡΟΣΩΜΟΙΩΣΗ ONLINE AI ΑΝΑΛΥΣΗΣ ΥΓΕΙΑΣ
            // Εδώ το AI αναγνωρίζει λέξεις-κλειδιά (ζάχαρη, γύρος, κοτόπουλο) για να βγάλει αυτόματα το σκορ υγείας
            setTimeout(() => {
                let healthScore = 6; // Προεπιλογή: Ουδέτερο
                const lowerProd = product.toLowerCase();

                if (lowerProd.includes("γύρος") || lowerProd.includes("σουβλάκι") || lowerProd.includes("donut") || lowerProd.includes("burger")) healthScore = 2;
                else if (lowerProd.includes("μπάρα") || lowerProd.includes("energy")) healthScore = 5;
                else if (lowerProd.includes("σαλάτα") || lowerProd.includes("κοτόπουλο") || lowerProd.includes("μπρόκολο")) healthScore = 10;
                else if (lowerProd.includes("ρύζι") || lowerProd.includes("μακαρόνια")) healthScore = 6;
                else if (lowerProd.includes("αναψυκτικό") || lowerProd.includes("red bull") || lowerProd.includes("ποτό")) healthScore = 1;

                const costScore = calculateCostScore(price);
                let finalScore = (costScore + healthScore + desire) / 3;

                if (isSocial) {
                    finalScore += 1.0;
                    if (finalScore > 10) finalScore = 10;
                }

                finalScore = finalScore.toFixed(1);
                
                document.getElementById('loadingText').style.display = "none";
                const resBox = document.getElementById('resultBox');
                resBox.style.display = "block";

                if (finalScore >= 7.5) {
                    resBox.className = "green";
                    resBox.innerHTML = `Σκορ: ${finalScore}<br>🟢 ΠΡΑΣΙΝΟ ΦΩΣ!<br><span style="font-size:13px; font-weight:normal;">AI Εκτίμηση Υγείας: ${healthScore}/10. Εγκρίνεται!</span>`;
                } else if (finalScore >= 6.0 && finalScore <= 7.4) {
                    resBox.className = "yellow";
                    resBox.innerHTML = `Σκορ: ${finalScore}<br>🟡 ΚΙΤΡΙΝΟ ΦΩΣ!<br><span style="font-size:13px; font-weight:normal;">AI Εκτίμηση Υγείας: ${healthScore}/10. Οριακή έγκριση.</span>`;
                } else {
                    resBox.className = "red";
                    resBox.innerHTML = `Σκορ: ${finalScore}<br>🔴 ΚΟΚΚΙΝΟ ΦΩΣ!<br><span style="font-size:13px; font-weight:normal;">AI Εκτίμηση Υγείας: ${healthScore}/10. Μην το πάρεις!</span>`;
                }
            }, 1200); // 1.2 δευτερόλεπτα καθυστέρηση για να "σκεφτεί" το AI
        }
    </script>
</body>
</html>
